  Back to top

<script>
  // ====== CONFIGURE THIS ======
  const SHEET_ID = "1Z6zMinNwN3wG-ZvURG3S25BGWlvz-PLAtK7MpHBGZgA";
  // If you want a specific tab, set its name here, e.g. "Sheet1". Leave null to use the first sheet.
  const SHEET_NAME = null;

  // Only these columns will ever be read from the sheet, in this order.
  // Add a header here (spelled exactly as it appears in row 1 of the sheet)
  // if you want this tool to start using a new column. Anything else in
  // the sheet — now or added later — is ignored automatically.
  const ALLOWED_HEADERS = [
    "First Name",
    "Last Name",
    "Title",
    "Location",
    "Suite",
    "Type",
    "Sex",
    "NPI",
    "Age Range",
    "New Patients",
    "Any Patients",
    "Biography",
    "Photo URL"
  ];
  // ============================

  // Your spreadsheet's Location column just has the city name (e.g. "Albany").
  // This map adds the state for display only — it never touches the sheet.
  // Add a new city here (left = exactly how it appears in the sheet,
  // right = state to show next to it) whenever a new city gets added.
  const LOCATION_STATE_MAP = {
    "albany": "NY",
    "garden city": "NY",
    "hauppauge": "NY",
    "massapequa": "NY",
    "syosset": "NY",
    "wilmington": "NC"
  };

  // Builds a 1-2 letter initials string for the fallback avatar when a
  // provider has no photo (e.g. "Gabrielle Bellamente" -> "GB").
  function initials(name){
    const parts = (name || "").trim().split(/\s+/).filter(Boolean);
    if (parts.length === 0) return "?";
    if (parts.length === 1) return parts[0][0].toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function formatLocation(loc){
    if (!loc) return loc;
    const trimmed = loc.trim();
    const state = LOCATION_STATE_MAP[trimmed.toLowerCase()];
    return state ? `${trimmed}, ${state}` : trimmed;
  }

  let allRows = [];
  let headers = [];
  let activeType = "All";
  let activeLocation = "All";
  let activeTitle = "All";
  let activeSex = "All";
  let sortDirection = "asc";
  let biosVisible = true;
  // If this page's URL locks it to a specific type (e.g. /prescribers),
  // "Reset filters" should snap back to that type, not to "All" — a
  // Prescribers page shouldn't be able to reset its way into showing
  // Therapists too.
  let lockedType = "All";

  function buildUrl(){
    let url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    if (SHEET_NAME) url += `&sheet=${encodeURIComponent(SHEET_NAME)}`;
    return url;
  }

  // Google's gviz endpoint responds via a JS callback (JSONP-style),
  // so we load it as a <script> tag rather than fetch(), which sidesteps
  // CORS restrictions on cross-origin reads of the spreadsheet.
  window.google = {
    visualization: {
      Query: {
        setResponse: function(data){
          try{
            const cols = data.table.cols.map(c => (c.label || c.id || "").trim());
            const rawHeaders = cols.map((c,i) => c || `Column ${i+1}`);

            // Only keep columns that are in ALLOWED_HEADERS (case-insensitive,
            // trimmed match). This is what stops new spreadsheet columns from
            // ever showing up here without an explicit code change above.
            // Map each sheet column index to its canonical ALLOWED_HEADERS
            // spelling, so row objects always use consistent, known keys.
            const colToCanonical = rawHeaders.map(rh =>
              ALLOWED_HEADERS.find(h => h.toLowerCase() === rh.toLowerCase()) || null
            );
            headers = ALLOWED_HEADERS.filter(h => colToCanonical.includes(h));

            allRows = data.table.rows.map(r => {
              const obj = {};
              r.c.forEach((cell, i) => {
                const canonical = colToCanonical[i];
                if (!canonical) return;
                const val = cell ? (cell.f !== undefined && cell.f !== null ? cell.f : cell.v) : "";
                obj[canonical] = val === null || val === undefined ? "" : String(val);
              });
              return obj;
            }).filter(row => Object.values(row).some(v => v && v.trim() !== ""));

            populateFilters();
            applyUrlFilters();
            updateHeading();
            render(document.getElementById('searchInput').value);
            injectStructuredData();
          }catch(err){
            showError("Could not read the spreadsheet data. Double check the sheet is shared as 'Anyone with the link can view'.");
          }
        }
      }
    }
  };

  // Builds schema.org structured data (an ItemList of Physician entries) from
  // the full, unfiltered directory so search engines can understand this page
  // lists specific named providers — even though there's one URL for all of
  // them. This runs against allRows (not the current filtered/search view),
  // so the structured data always reflects the entire roster.
  function buildPhysicianJsonLd(){
    const typeKey = headers.find(h => /^type$/i.test(h));
    const locationKey = headers.find(h => /^location$/i.test(h));
    const titleKey = headers.find(h => /^title$/i.test(h));
    const firstKey = headers.find(h => /^first(\s|_)?name$/i.test(h));
    const lastKey = headers.find(h => /^last(\s|_)?name$/i.test(h));
    const fallbackNameKey = headers.find(h => /name/i.test(h)) || headers[0];
    const photoUrlKey = headers.find(h => /^photo(\s|_)?(url)?$/i.test(h));
    const bioKey = headers.find(h => /^biography$/i.test(h));
    const npiKey = headers.find(h => /^npi$/i.test(h));

    const items = allRows.map((row, i) => {
      const name = (firstKey && lastKey)
        ? `${row[firstKey] || ""} ${row[lastKey] || ""}`.trim()
        : (row[fallbackNameKey] || "").trim();
      if (!name) return null;

      const physician = { "@type": "Physician", "name": name };

      if (titleKey && row[titleKey] && row[titleKey].trim()){
        physician.honorificSuffix = row[titleKey].trim();
      }
      if (typeKey && row[typeKey] && row[typeKey].trim()){
        physician.jobTitle = row[typeKey].trim();
      }
      if (photoUrlKey && row[photoUrlKey] && row[photoUrlKey].trim()){
        physician.image = row[photoUrlKey].trim();
      }
      if (locationKey && row[locationKey] && row[locationKey].trim()){
        const parts = formatLocation(row[locationKey]).split(",").map(s => s.trim());
        physician.address = { "@type": "PostalAddress", "addressLocality": parts[0] };
        if (parts[1]) physician.address.addressRegion = parts[1];
      }
      if (npiKey && row[npiKey] && row[npiKey].trim()){
        physician.identifier = { "@type": "PropertyValue", "propertyID": "NPI", "value": row[npiKey].trim() };
      }
      if (bioKey && row[bioKey] && row[bioKey].trim()){
        const bio = row[bioKey].trim();
        physician.description = bio.length > 300 ? bio.slice(0, 297) + "..." : bio;
      }

      return { "@type": "ListItem", "position": i + 1, "item": physician };
    }).filter(Boolean);

    return {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": document.getElementById('pageHeading') ? document.getElementById('pageHeading').textContent : "Provider Directory",
      "itemListElement": items
    };
  }

  function injectStructuredData(){
    let script = document.getElementById('providerStructuredData');
    if (!script){
      script = document.createElement('script');
      script.type = "application/ld+json";
      script.id = "providerStructuredData";
      document.head.appendChild(script);
    }
    script.textContent = JSON.stringify(buildPhysicianJsonLd());
  }

  function showError(msg){
    document.getElementById('status').textContent = "";
    document.getElementById('results').innerHTML = `<div class="error">${msg}</div>`;
  }

  function loadSheet(){
    const script = document.createElement('script');
    script.src = buildUrl();
    script.onerror = () => showError("Couldn't reach the spreadsheet. Make sure it's shared as 'Anyone with the link can view'.");
    document.body.appendChild(script);
  }

  // Lets a page embedding this tool link directly to a pre-filtered view,
  // e.g. index.html?type=Therapist or index.html?type=Prescriber&location=Albany
  // This is what lets one file serve multiple Squarespace pages (Therapists,
  // Prescribers, etc.) without duplicating any code — each page's embed just
  // points to a different query string.
  //
  // Some page builders (Squarespace's Code Block included, in some setups)
  // run pasted <script> tags in a context whose own location doesn't match
  // what's visible in the browser's address bar. So we first try reading
  // the real top-level page URL, and only fall back to this script's own
  // location if that's not accessible (e.g. blocked by browser security).
  function getPageLocation(){
    try {
      if (window.top && window.top.location && window.top.location.href !== undefined){
        return window.top.location;
      }
    } catch (e) {
      // Cross-origin or otherwise blocked — fall through to the default below.
    }
    return window.location;
  }

  // If there's no explicit ?type= in the URL, guess the intended type from
  // the page's own URL slug — so a plain link like evolvepsychiatry.com/prescribers
  // (no query string at all) still auto-filters correctly. Add more keywords
  // here if you create more type-specific pages later.
  function typeFromPath(pathname){
    const path = (pathname || "").toLowerCase();
    if (path.includes("prescriber")) return "Prescriber";
    if (path.includes("therapist")) return "Therapist";
    return null;
  }

  function applyUrlFilters(){
    const loc = getPageLocation();
    const params = new URLSearchParams(loc.search);

    // Type no longer has toggle buttons, so match the requested value
    // directly against the distinct Type values found in the spreadsheet.
    const typeKey = headers.find(h => /^type$/i.test(h));
    if (typeKey){
      const requestedType = params.get('type') || typeFromPath(loc.pathname);
      if (requestedType){
        const knownTypes = [...new Set(allRows.map(r => (r[typeKey] || "").trim()).filter(Boolean))];
        const matchedType = knownTypes.find(t => t.toLowerCase() === requestedType.trim().toLowerCase());
        if (matchedType){
          activeType = matchedType;
          lockedType = matchedType;
        }
      }
    }

    function applyToButtons(paramName, filterName, setter){
      const val = params.get(paramName);
      if (!val) return;
      const btns = document.querySelectorAll(`#filterBarLocation button[data-filter="${filterName}"]`);
      let matched = null;
      btns.forEach(b => {
        if (b.dataset.value.toLowerCase() === val.trim().toLowerCase()) matched = b;
      });
      if (matched){
        btns.forEach(b => b.classList.remove('active'));
        matched.classList.add('active');
        setter(matched.dataset.value);
        const mobileSelect = document.querySelector('#filterBarLocation select[data-filter="location-mobile"]');
        if (mobileSelect) mobileSelect.value = matched.dataset.value;
      }
    }

    function applyToSelect(paramName, filterName, setter){
      const val = params.get(paramName);
      if (!val) return;
      const select = document.querySelector(`#filterBarInline select[data-filter="${filterName}"]`);
      if (!select) return;
      const match = [...select.options].find(o => o.value.toLowerCase() === val.trim().toLowerCase());
      if (match){
        select.value = match.value;
        setter(match.value);
      }
    }

    applyToButtons('location', 'location', v => activeLocation = v);
    applyToSelect('sex', 'sex', v => activeSex = v);

    const q = params.get('q');
    if (q) document.getElementById('searchInput').value = q;
  }

  // Sets the page heading based on which type (if any) this page is
  // locked to — e.g. "Find Your Prescriber" on the Prescribers page,
  // "Find Your Therapist" on the Therapists page, or the generic
  // "Find Your Clinician" when there's no locked type at all.
  // Short blurb shown under the heading, per type. Add an entry here if
  // you ever lock another page to a new Type value.
  function updateHeading(){
    const heading = document.getElementById('pageHeading');
    if (!heading) return;
    if (lockedType && lockedType !== "All"){
      heading.textContent = `Meet Our ${lockedType}s`;
    } else {
      heading.textContent = "Find Your Clinician";
    }
  }

  function resetAllFilters(){
    activeType = lockedType;
    activeLocation = "All";
    activeTitle = "All";
    activeSex = "All";
    document.getElementById('searchInput').value = "";
    document.querySelectorAll('#filterBarLocation button[data-filter]').forEach(b => {
      b.classList.toggle('active', b.dataset.value === "All");
    });
    document.querySelectorAll('#filterBarLocation select[data-filter], #filterBarInline select[data-filter]').forEach(s => {
      s.value = "All";
    });
    render("");
  }

  function populateFilters(){
    const filterBarInline = document.getElementById('filterBarInline');
    const filterBarLocation = document.getElementById('filterBarLocation');
    const typeKey = headers.find(h => /^type$/i.test(h));
    const locationKey = headers.find(h => /^location$/i.test(h));
    const titleKey = headers.find(h => /^title$/i.test(h));
    const sexKey = headers.find(h => /^sex$/i.test(h));

    let locationHtml = "";
    if (locationKey){
      const locations = [...new Set(allRows.map(r => (r[locationKey] || "").trim()).filter(Boolean))]
        .sort((a, b) => {
          const aRemote = /^remote$/i.test(a);
          const bRemote = /^remote$/i.test(b);
          if (aRemote && !bRemote) return 1;
          if (bRemote && !aRemote) return -1;
          return a.localeCompare(b);
        });
      // Two versions of the same control: buttons for wider screens, a
      // dropdown for narrow ones. CSS shows only one at a time based on
      // viewport width; both stay wired to the same activeLocation state.
      locationHtml = `<div class="filter-group location-buttons-group">
        <span class="filter-label">Location</span>
        <button class="filter-btn active" data-filter="location" data-value="All">All</button>
        ${locations.map(l => `<button class="filter-btn" data-filter="location" data-value="${escapeHtml(l)}">${escapeHtml(formatLocation(l))}</button>`).join("")}
      </div>
      <div class="filter-group location-select-group">
        <span class="filter-label">Location</span>
        <div class="select-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.1-7-11.5A7 7 0 0 1 19 9.5C19 14.9 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.5"/></svg>
          <select class="filter-select" data-filter="location-mobile">
            <option value="All">All</option>
            ${locations.map(l => `<option value="${escapeHtml(l)}">${escapeHtml(formatLocation(l))}</option>`).join("")}
          </select>
        </div>
      </div>`;
    }
    filterBarLocation.innerHTML = locationHtml;

    let inlineHtml = "";
    if (sexKey){
      const sexes = [...new Set(allRows.map(r => (r[sexKey] || "").trim()).filter(Boolean))].sort();
      inlineHtml = `<div class="filter-group">
        <span class="filter-label">Sex</span>
        <div class="select-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="14" cy="10" r="5"/><line x1="17.5" y1="6.5" x2="21" y2="3"/><polyline points="21 6 21 3 18 3"/><circle cx="9" cy="14" r="5"/><line x1="9" y1="19" x2="9" y2="23"/><line x1="6" y1="21" x2="12" y2="21"/></svg>
          <select class="filter-select" data-filter="sex">
            <option value="All">All</option>
            ${sexes.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("")}
          </select>
        </div>
      </div>`;
    }
    filterBarInline.innerHTML = inlineHtml;

    const locationMobileSelect = filterBarLocation.querySelector('select[data-filter="location-mobile"]');

    filterBarLocation.querySelectorAll('button[data-filter="location"]').forEach(btn => {
      btn.addEventListener('click', () => {
        filterBarLocation.querySelectorAll('button[data-filter="location"]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeLocation = btn.dataset.value;
        if (locationMobileSelect) locationMobileSelect.value = btn.dataset.value;
        render(document.getElementById('searchInput').value);
      });
    });

    if (locationMobileSelect){
      locationMobileSelect.addEventListener('change', () => {
        activeLocation = locationMobileSelect.value;
        filterBarLocation.querySelectorAll('button[data-filter="location"]').forEach(b => {
          b.classList.toggle('active', b.dataset.value === locationMobileSelect.value);
        });
        render(document.getElementById('searchInput').value);
      });
    }

    const sexSelect = filterBarInline.querySelector('select[data-filter="sex"]');
    if (sexSelect){
      sexSelect.addEventListener('change', () => {
        activeSex = sexSelect.value;
        render(document.getElementById('searchInput').value);
      });
    }

  }

  function updateScopeLine(count){
    const scopeLine = document.getElementById('scopeLine');
    const parts = [];

    // Type is the subject noun itself ("all Prescribers") rather than a
    // "for" clause, so it reads naturally: "Showing all Prescribers in Albany, NY."
    const subjectHtml = activeType !== "All"
      ? `<strong>all ${escapeHtml(activeType)}s</strong>`
      : `<strong>all</strong> providers`;

    if (activeTitle !== "All"){
      parts.push(`for <strong>${escapeHtml(activeTitle)}</strong>`);
    }

    if (activeLocation !== "All"){
      parts.push(`in <strong>${escapeHtml(formatLocation(activeLocation))}</strong>`);
    }

    if (activeSex !== "All"){
      parts.push(`who are <strong>${escapeHtml(activeSex.toLowerCase())}</strong>`);
    }

    const countText = `<span class="scope-count">(${count} ${count === 1 ? 'result' : 'results'})</span>`;

    const query = document.getElementById('searchInput').value.trim();
    const anyFilterActive = activeType !== lockedType || activeLocation !== "All" ||
      activeTitle !== "All" || activeSex !== "All" || query !== "";
    const resetHtml = anyFilterActive
      ? ` <button type="button" class="reset-btn" id="scopeResetFilters">Reset filters</button>`
      : "";

    const bioToggleHtml = ` <button type="button" class="bio-global-toggle" id="bioGlobalToggle" aria-pressed="${biosVisible}">` +
      `<span class="bio-global-toggle-track"><span class="bio-global-toggle-thumb"></span></span>` +
      `Biographies ${biosVisible ? "on" : "off"}</button>`;

    if (parts.length === 0){
      scopeLine.innerHTML = `Showing ${subjectHtml}. ${countText}${bioToggleHtml}${resetHtml}`;
    } else {
      scopeLine.innerHTML = `Showing ${subjectHtml} ${parts.join(" ")}. ${countText}${bioToggleHtml}${resetHtml}`;
    }
  }

  function highlight(text, query){
    if (!query) return escapeHtml(text);
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return escapeHtml(text);
    return escapeHtml(text.slice(0, idx)) +
           "<mark>" + escapeHtml(text.slice(idx, idx + query.length)) + "</mark>" +
           escapeHtml(text.slice(idx + query.length));
  }

  function escapeHtml(str){
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function render(query){
    const resultsEl = document.getElementById('results');
    const q = query.trim().toLowerCase();
    const typeKey = headers.find(h => /^type$/i.test(h));
    const locationKey = headers.find(h => /^location$/i.test(h));
    const titleKey = headers.find(h => /^title$/i.test(h));
    const sexKey = headers.find(h => /^sex$/i.test(h));

    let filtered = allRows;

    if (typeKey && activeType !== "All"){
      filtered = filtered.filter(row => (row[typeKey] || "").trim() === activeType);
    }
    if (locationKey && activeLocation !== "All"){
      filtered = filtered.filter(row => (row[locationKey] || "").trim() === activeLocation);
    }
    if (titleKey && activeTitle !== "All"){
      filtered = filtered.filter(row => (row[titleKey] || "").trim() === activeTitle);
    }
    if (sexKey && activeSex !== "All"){
      filtered = filtered.filter(row => (row[sexKey] || "").trim() === activeSex);
    }
    if (q !== ""){
      filtered = filtered.filter(row => {
        const fullName = `${row["First Name"] || ""} ${row["Last Name"] || ""}`.toLowerCase();
        return fullName.includes(q);
      });
    }

    const lastNameKey = headers.find(h => /^last(\s|_)?name$/i.test(h));
    const sortKey = lastNameKey || headers.find(h => /name/i.test(h)) || headers[0];
    filtered = [...filtered].sort((a, b) => {
      const aIsMD = titleKey && (a[titleKey] || "").trim().toUpperCase() === "MD" ? 0 : 1;
      const bIsMD = titleKey && (b[titleKey] || "").trim().toUpperCase() === "MD" ? 0 : 1;
      if (aIsMD !== bIsMD){
        return sortDirection === "asc" ? aIsMD - bIsMD : bIsMD - aIsMD;
      }
      const cmp = (a[sortKey] || "").toLowerCase().localeCompare((b[sortKey] || "").toLowerCase());
      return sortDirection === "asc" ? cmp : -cmp;
    });

    updateScopeLine(filtered.length);

    if (filtered.length === 0){
      const msg = q === ""
        ? "No providers match the current filters."
        : `No providers match "${escapeHtml(query)}".`;
      resultsEl.innerHTML = `<div class="empty">${msg}</div>`;
      return;
    }

    // Combine First Name + Last Name into a single title if both exist,
    // otherwise fall back to any single "name-like" column.
    const firstKey = headers.find(h => /^first(\s|_)?name$/i.test(h));
    const lastKey = headers.find(h => /^last(\s|_)?name$/i.test(h));
    const fallbackNameKey = headers.find(h => /name/i.test(h)) || headers[0];

    resultsEl.innerHTML = filtered.slice(0, 200).map(row => {
      let name, skipKeys;
      if (firstKey && lastKey){
        name = `${row[firstKey] || ""} ${row[lastKey] || ""}`.trim() || "—";
        skipKeys = [firstKey, lastKey];
      } else {
        name = row[fallbackNameKey] || "—";
        skipKeys = [fallbackNameKey];
      }
      const plainName = name;
      if (titleKey){
        skipKeys.push(titleKey);
        if (row[titleKey] && row[titleKey].trim()){
          name = `${name}, ${row[titleKey].trim()}`;
        }
      }

      const photoUrlKey = headers.find(h => /^photo(\s|_)?(url)?$/i.test(h));
      const photoSrc = photoUrlKey && row[photoUrlKey] && row[photoUrlKey].trim();

      const newPatientsKey = headers.find(h => /^new(\s|_)?patients$/i.test(h));
      if (newPatientsKey) skipKeys.push(newPatientsKey);

      const anyPatientsKey = headers.find(h => /^any(\s|_)?patients$/i.test(h));
      if (anyPatientsKey) skipKeys.push(anyPatientsKey);

      const bioKey = headers.find(h => /^biography$/i.test(h));
      if (bioKey) skipKeys.push(bioKey);
      const bioText = bioKey && row[bioKey] ? row[bioKey].trim() : "";

      if (locationKey) skipKeys.push(locationKey);
      const locationBadgeHtml = (locationKey && row[locationKey] && row[locationKey].trim())
        ? `<span class="location-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.1-7-11.5A7 7 0 0 1 19 9.5C19 14.9 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.5"/></svg>${highlight(formatLocation(row[locationKey]), query)}</span>`
        : "";

      const otherFields = headers
        .filter(h => !skipKeys.includes(h) && h !== photoUrlKey && row[h])
        .map(h => `<span><b>${escapeHtml(h)}:</b> ${h === locationKey ? highlight(formatLocation(row[h]), query) : highlight(row[h], query)}</span>`)
        .join("");
      const fieldsHtml = otherFields ? `<div class="fields">${otherFields}</div>` : "";

      const patientMessages = [];
      if (newPatientsKey && /^no$/i.test((row[newPatientsKey] || "").trim())){
        patientMessages.push("Currently not accepting new patients.");
      }
      if (anyPatientsKey && /^no$/i.test((row[anyPatientsKey] || "").trim())){
        patientMessages.push("Currently not accepting any patients.");
      }
      const patientMessagesHtml = patientMessages.length
        ? `<div class="new-patients-closed">${patientMessages.join(" ")}</div>`
        : "";

      const acceptingNewHtml = (newPatientsKey && /^yes$/i.test((row[newPatientsKey] || "").trim()))
        ? `<div class="new-patients-open"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Accepting new patients.</div>`
        : "";

      const notAcceptingNew = newPatientsKey && /^no$/i.test((row[newPatientsKey] || "").trim());
      const telehealthHtml = (locationKey && /^remote$/i.test((row[locationKey] || "").trim()) && !notAcceptingNew)
        ? `<div class="telehealth-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Telehealth appointments only.</div>`
        : "";

      const bioHtml = bioText
        ? `<div class="bio">
            <p class="bio-text"${biosVisible ? "" : " hidden"}>${highlight(bioText, query)}</p>
          </div>`
        : "";

      const roleDescriptor = typeKey && row[typeKey] && row[typeKey].trim() ? row[typeKey].trim() : "";
      const locationDescriptor = (locationKey && row[locationKey] && row[locationKey].trim())
        ? formatLocation(row[locationKey])
        : "";
      const photoAlt = [
        name,
        roleDescriptor,
        locationDescriptor ? `in ${locationDescriptor}` : ""
      ].filter(Boolean).join(", ").replace(/, in /, " in ");

      const photoHtml = photoSrc
        ? `<img class="photo" src="${escapeHtml(photoSrc)}" alt="${escapeHtml(photoAlt)}" loading="lazy" onerror="this.remove()" />`
        : `<div class="photo photo-initials">${escapeHtml(initials(plainName))}</div>`;

      return `
        <div class="card">
          <div class="card-header">
            ${photoHtml}
            <div class="card-heading">
              <h2 class="name">${highlight(name, query)}</h2>
              ${locationBadgeHtml}
            </div>
          </div>
          <div class="card-body">
            ${acceptingNewHtml}
            ${telehealthHtml}
            ${patientMessagesHtml}
            ${fieldsHtml}
            ${bioHtml}
          </div>
        </div>`;
    }).join("");
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    render(e.target.value);
  });

  document.getElementById('results').addEventListener('click', (e) => {
    const img = e.target.closest('.photo');
    if (!img) return;
    const lightbox = document.getElementById('photoLightbox');
    const lightboxImg = document.getElementById('photoLightboxImg');
    lightboxImg.src = img.src;
    lightboxImg.alt = img.alt;
    lightbox.classList.add('open');
  });

  document.getElementById('photoLightbox').addEventListener('click', () => {
    document.getElementById('photoLightbox').classList.remove('open');
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape'){
      document.getElementById('photoLightbox').classList.remove('open');
    }
  });

  document.getElementById('scopeLine').addEventListener('click', (e) => {
    if (e.target.closest('#scopeResetFilters')) resetAllFilters();
    if (e.target.closest('#bioGlobalToggle')){
      biosVisible = !biosVisible;
      render(document.getElementById('searchInput').value);
    }
  });

  // Shows a "back to top" button once the visitor has scrolled a fair way
  // down the page, so they don't have to scroll all the way back up
  // manually after browsing through the provider list.
  const scrollTopBtn = document.getElementById('scrollTopBtn');
  const SCROLL_SHOW_THRESHOLD = 500;
  window.addEventListener('scroll', () => {
    scrollTopBtn.classList.toggle('visible', window.scrollY > SCROLL_SHOW_THRESHOLD);
  }, { passive: true });
  scrollTopBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  loadSheet();
</script>
</div>
